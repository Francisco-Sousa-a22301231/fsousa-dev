  <rect x="0" y="610" width="1200" height="20" fill="#f97316"/>
  <!-- FS logo -->
  <text x="80" y="120" font-family="Arial,Helvetica,sans-serif" font-size="48" font-weight="bold" fill="#f97316">FS</text>
  <!-- Main headline -->
  <text x="80" y="280" font-family="Arial,Helvetica,sans-serif" font-size="64" font-weight="bold" fill="white">Websites que trazem</text>
  <text x="80" y="360" font-family="Arial,Helvetica,sans-serif" font-size="64" font-weight="bold" fill="#f97316">clientes.</text>
  <!-- Subheadline -->
  <text x="80" y="440" font-family="Arial,Helvetica,sans-serif" font-size="28" fill="white" opacity="0.7">Websites rápidos e modernos para negócios em Cascais</text>
  <!-- Info badges -->
  <text x="80" y="530" font-family="Arial,Helvetica,sans-serif" font-size="22" fill="white" opacity="0.5">A partir de €300  ·  Pronto em 5 dias  ·  Francisco Sousa</text>
